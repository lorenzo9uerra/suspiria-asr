dataset:
  repo_id: "3podi/eurospeech-latents-bf16"
  revision: null
  local_dataset_root: null
  manifest_glob: "manifests/*/*/paired_manifest.jsonl"
  country: "italy"
  splits:
    - train
    - validation
    #- test
  latents_path: ""
  materialized_latents_dir: "out/materialized_latents"
  force_rematerialize: false
  cleanup_parquet_after_materialize: true
  materialize_speaker_prefix: false
  materialization_num_workers: 8
  materialization_batch_size: 128
  step_ms: 80
  left_pad_steps: 16
  delay_min_ms: 1200
  delay_max_ms: 2400

tokenizer:
  name: "flexitok/bpe_ita_Latn_32000_v2"
  revision: null
  use_fast: true
  bos_token: "[BOS]"
  eos_token: "[EOS]"
  pad_wait_token: "[P]"
  word_start_token: "[W]"
  additional_special_tokens:
    - "[P]"
    - "[W]"

model:
  audio_input_dim: 32
  hidden_size: 1024
  num_layers: 12
  num_heads: 16
  num_kv_heads: 4
  ffw_hidden_size: 4096
  attention_window: 8192
  rope_theta: 1000000.0
  rms_norm_eps: 1.0e-5
  max_position_embeddings: 16384
  time_condition_dim: 32
  time_embedding_theta: 10000.0
  #tied embedding gives poor results
  tie_word_embeddings: false
  pretrained_weights_path: null
  pretrained_strict: false

optimization:
  batch_size: 128
  lr: 0.0003
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  fused_optimizer: true
  warmup_steps: 100
  lr_schedule: cosine
  final_lr_scale: 0.1
  grad_clip_norm: 1.0
  max_steps: 1000

loss:
  eos_factor: 1.0
  pad_wait_factor: 0.25
  word_start_factor: 2.0

scaling:
  enabled: false
  model_name: null
  target_tokens: null
  output_name: "output.pt"
  flops_context_tokens: null

ema:
  enabled: false
  decay: 0.999

evaluation:
  validation_every_steps: 100
  max_eval_batches: null
  use_ema_for_eval: true
  compute_train_metrics: false

wer:
  enabled: false
  batch_size: 4
  max_batches: 4
  # Can be a single value, e.g. 2400, or a list, e.g. [80, 800, 2400].
  delay_ms: 2400
  # If flush_steps is null, WER generation uses delay_steps + extra_flush_steps.
  # The extra budget lets delayed final text tokens and EOS flush after the delay.
  extra_flush_steps: 128
  flush_steps: null
  max_decode_steps: null
  remove_diacritics: false
  cer_ignore_spaces: true
  wandb_log_prediction_batches: 0

wandb:
  enabled: true
  project: "suspiria-asr"
  entity: null
  run_name: null
  group: null
  tags: []
  mode: "online"

runtime:
  seed: 1337
  deterministic: false
  data_dtype: bf16
  model_dtype: bf16
  device: null
  num_workers: 4
  pin_memory: true
  output_dir: "out/training"
  checkpoint_path: null
  log_every_steps: 10
  save_every_steps: 10000
  test_only: false
