dataset:
  repo_id: null
  revision: null
  local_dataset_root: null
  manifest_glob: "manifests/*/*/paired_manifest.jsonl"
  country: "france"
  latents_path: ""
  materialized_latents_dir: "out/materialized_latents"
  force_rematerialize: false
  cleanup_parquet_after_materialize: false
  materialize_speaker_prefix: true
  materialization_num_workers: 1
  step_ms: 80
  left_pad_steps: 32
  delay_min_ms: 80
  delay_max_ms: 2400

tokenizer:
  name: "mistralai/Mistral-7B-v0.1"
  revision: null
  use_fast: true
  bos_token: "[BOS]"
  eos_token: "[EOS]"
  pad_wait_token: "[P]"
  word_start_token: "[W]"
  additional_special_tokens:
    - "[P]"
    - "[W]"

model:
  audio_input_dim: 512
  hidden_size: 1024
  num_layers: 12
  num_heads: 16
  num_kv_heads: 4
  ffw_hidden_size: 4096
  attention_window: 8192
  rope_theta: 1000000.0
  rms_norm_eps: 1.0e-5
  max_position_embeddings: 16384
  time_condition_dim: 32
  time_embedding_theta: 10000.0
  tie_word_embeddings: true
  pretrained_weights_path: null
  pretrained_strict: false

optimization:
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  fused_optimizer: true
  warmup_steps: 100
  lr_schedule: cosine
  final_lr_scale: 0.1
  grad_clip_norm: 1.0
  max_steps: 1000

loss:
  bos_factor: 1.0
  eos_factor: 1.0
  pad_wait_factor: 1.0
  word_start_factor: 1.0

ema:
  enabled: false
  decay: 0.999

evaluation:
  validation_every_steps: 100
  max_eval_batches: null
  use_ema_for_eval: true
  compute_train_metrics: false

wer:
  enabled: false
  batch_size: 4
  max_batches: 4
  # Can be a single value, e.g. 2400, or a list, e.g. [80, 800, 2400].
  delay_ms: 2400
  flush_steps: null
  max_decode_steps: null
  remove_diacritics: false

wandb:
  enabled: false
  project: "suspiria-asr"
  entity: null
  run_name: null
  group: null
  tags: []
  mode: "online"

runtime:
  seed: 1337
  deterministic: false
  data_dtype: bf16
  model_dtype: bf16
  device: null
  num_workers: 0
  pin_memory: false
  output_dir: "out/training"
  checkpoint_path: null
  log_every_steps: 10
  save_every_steps: 100
  test_only: false
